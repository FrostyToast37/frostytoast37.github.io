<!DOCTYPE html>
<html>

<head>
    <title>FrostyToast37's Fun</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <!-- BUTTONS -->
    <div class="button-group">
        <span class="madebyothers">
            <h1>MADE BY OTHER PEOPLE</h1>
            <button onclick="openCookieChaos()">COOKIE OF CHAOS?</button>
            <button onclick="openCC3d()">CC3d?</button>
            <button onclick="openSR3d()">SNOW RIDER 3d?</button>
            <button onclick="openMC()">Fun?</button>
            <button onclick="openOOS()">OOS?</button>
        </span>
        <span class="madebyme">
            <p>ANDREW GOT BORED</p>
            <button onclick="crash()">DO NOT CLICK THIS</button>
            <button onclick="openTextAdventure()">Click for an adventure?</button>
            <button onclick="openGOL()">What is Life?</button>
            <button onclick="openAI()">Game?</button>
            <button onclick="openaMessage()">aMessage app</button>
        </span>
    </div>
    
    


    <script>
        function openCookieChaos() {
            window.open("https://cookiechaos.xyz");
        }
        function openCC3d() {
            var win = window.open()
            var url = "https://crazy-cattle.github.io/"
            var iframe = win.document.createElement('iframe')
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            iframe.src = url
            win.document.body.appendChild(iframe)
        }
        function openSR3d() {
            window.open("https://morellifamily.asuscomm.com/Snow-Rider3D-main/index.html")
        }
        function iframe() {
            var win = window.open()
            var url = "https://morellifamily.asuscomm.com/crash.html"
            var iframe = win.document.createElement('iframe')
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            iframe.src = url
            win.document.body.appendChild(iframe)
        }
        function crash() {
            for (let step = 0; step <100; step++) {
                iframe();
            }
        }
        function openTextAdventure() {
            window.open("https://morellifamily.asuscomm.com/text-adventure");
        }
        function openGOL() {
            window.open("https://morellifamily.asuscomm.com/gol");
        }
        function openMC() {
            window.open("https://morellifamily.asuscomm.com/fun.html");
        }
        function openOOS() {
            window.open("https://morellifamily.asuscomm.com/OOS.html");
        }
        function openAI() {
            window.open("https://morellifamily.asuscomm.com/ai-game");
        }
        function openaMessage() {
            window.open("https://morellifamily.asuscomm.com/aMessage")
        }
    </script>
</body>
</html>
