<!DOCTYPE html>
<head>

  <link rel="stylesheet" href="login.css">

</head>
<body>
  <form id="sign_up_form" autocomplete="off" method="post">
    <h1>
      Sign Up
    </h1>
    <label id="username_label" for="username">Username</label>
    <input type="text" id="username_input" name="username" placeholder="Your Username" autofocus>
    <label id="password_label" for="password">Password</label>
    <input type="password" id="password_input" name="password" placeholder="Your Password" autofocus>
    <div id="output_div"></div>
    <button class="submit_button" type="submit"> SIGN UP </button>
  </form>
